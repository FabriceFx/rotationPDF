<style>
  /* Variables CSS — Charte Google Workspace (Material Design 3) */
  :root {
    --primary: #0b57d0;
    --primary-hover: #0842a0;
    --secondary: #444746;
    --bg-app: #f3f6fc;
    --bg-card: #ffffff;
    --text-main: #1f1f1f;
    --text-muted: #444746;
    --border: #c7c7c7;
    --border-light: #e3e3e3;
    --border-focus: #0b57d0;
    --success: #146c2e;
    --error: #b3261e;
    --radius-lg: 16px;
    --radius-md: 8px;
    --radius-sm: 4px;
    --radius-pill: 100px;
    --transition: all 0.15s ease-in-out;
    --footer-height: 60px;
  }

  /* Reset & Base */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Open Sans', 'Inter', system-ui, -apple-system, sans-serif;
    background-color: var(--bg-app);
    color: var(--text-main);
    font-size: 13px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Conteneur principal défilant */
  .container {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    padding-bottom: var(--footer-height);
  }

  /* En-tête de Sidebar épuré blanc natif */
  .header {
    background: var(--bg-card);
    color: var(--text-main);
    padding: 16px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.01em;
  }

  .header h1 svg {
    color: var(--primary);
  }

  .header p {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Cartes de contenu plates sans ombre lourde (MD3 Flat Style) */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: none;
    transition: var(--transition);
  }

  .card:hover {
    border-color: #b8b8b8;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--text-main);
  }

  /* Formulaires Workspace */
  .form-group {
    margin-bottom: 8px;
  }

  .label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  /* Boutons d'Action (format Pilule Workspace) */
  .btn {
    width: 100%;
    padding: 8px 16px;
    font-weight: 600;
    font-size: 12px;
    text-align: center;
    cursor: pointer;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    transition: var(--transition);
    border: none;
  }

  .btn:disabled {
    background-color: var(--border-light) !important;
    color: var(--text-muted) !important;
    cursor: not-allowed;
    box-shadow: none !important;
    border-color: var(--border-light) !important;
  }

  .btn-primary {
    background-color: var(--primary);
    color: white;
    border-radius: var(--radius-pill);
  }

  .btn-primary:hover:not(:disabled) {
    background-color: var(--primary-hover);
    box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
  }

  .btn-angle.active {
    background-color: var(--primary) !important;
    color: white !important;
    border-color: var(--primary) !important;
  }

  /* Pied de page figé (Footer) */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: var(--footer-height);
    padding: 10px 12px;
    background-color: var(--bg-card);
    border-top: 1px solid var(--border-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--text-muted);
    z-index: 10;
  }

  .footer-logo {
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 600;
    color: var(--secondary);
  }

  .footer-links a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
  }

  .footer-links a:hover {
    text-decoration: underline;
  }

  /* Overlay chargeur flouté Google */
  #loadingOverlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    font-size: 12px;
    font-weight: 500;
    color: var(--primary);
  }
  #loadingOverlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay-spinner {
    width: 24px;
    height: 24px;
    border: 3px solid rgba(11, 87, 208, 0.15);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Toast Notification (style Toast Android / Google Workspace) */
  .toast {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #322f35;
    color: #f5eff7;
    padding: 10px 16px;
    border-radius: var(--radius-md);
    font-size: 11px;
    font-weight: 400;
    box-shadow: 0 3px 5px -1px rgba(0,0,0,0.2), 0 6px 10px 0 rgba(0,0,0,0.14);
    z-index: 2000;
    opacity: 0;
    transition: all 0.2s ease-in-out;
    pointer-events: none;
    white-space: pre-wrap;
    width: 90%;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error {
    border-left: 4px solid var(--error);
  }
  .toast.success {
    border-left: 4px solid var(--success);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animated-fade {
    animation: fadeIn 0.2s cubic-bezier(0, 0, 0.2, 1) forwards;
  }
</style>
